apiVersion: apps/v1
kind: Deployment
metadata:
  name: infra-service
  namespace: argocd
spec:
  replicas: 1
  selector:
    matchLabels:
      app: infra-service
  template:
    metadata:
      labels:
        app: infra-service
    spec:
      containers:
        - name: infra-service
          image: 858507113889.dkr.ecr.ap-northeast-2.amazonaws.com/argocd/infra-service:latest

          ports:
            - containerPort: 9003 # Spring Boot 앱 포트
          imagePullPolicy: Always
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"

            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://keycloak-db:5432/keycloak"
            - name: SPRING_DATASOURCE_USERNAME
              value: "keycloak"
            - name: SPRING_DATASOURCE_PASSWORD
              value: "keycloak"

            # 1. Flyway가 기존 DB를 무시하고 진행하게 설정
            - name: SPRING_FLYWAY_ENABLED
              value: "false"
            - name: SPRING_FLYWAY_BASELINE_ON_MIGRATE
              value: "false"

            # 2. Hibernate는 구조 검증만 수행 (싸움 방지)
            - name: SPRING_JPA_HIBERNATE_DDL_AUTO
              value: "update"

            - name: SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI
              value: "http://k8s-argocd-ctrlfing-24d9f59895-1823150137.ap-northeast-2.elb.amazonaws.com/auth/realms/ctrlf"
            # 3. 포트 확인 (Keycloak 내부망 접속 포트)
            - name: SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI
              value: "http://keycloak-service:8090/realms/ctrlf/protocol/openid-connect/certs"
      nodeSelector:
         zone: private
