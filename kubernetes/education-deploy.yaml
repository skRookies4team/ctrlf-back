apiVersion: apps/v1
kind: Deployment
metadata:
  name: education-service
  namespace: argocd
spec:
  replicas: 1
  selector:
    matchLabels:
      app: education-service
  template:
    metadata:
      labels:
        app: education-service
    spec:
      containers:
        - name: education-service
          # 여기에 아까 성공한 ECR 이미지 주소를 정확히 넣으세요a
          image: 858507113889.dkr.ecr.ap-northeast-2.amazonaws.com/argocd/education-service:latest
          ports:
            - containerPort: 9002 # Spring Boot 앱 포트
          imagePullPolicy: Always
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
            - name: SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI
              value: "http://k8s-argocd-ctrlfing-24d9f59895-1823150137.ap-northeast-2.elb.amazonaws.com/auth/realms/ctrlf"
            # 3. 포트 확인 (Keycloak 내부망 접속 포트)
            # - name: SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI
            #   value: "http://keycloak-service:8090/realms/ctrlf/protocol/openid-connect/certs"
      nodeSelector:
          zone: private
