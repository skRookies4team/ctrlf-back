server:
  port: 9003
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  jpa:
    properties:
      hibernate:
        default_schema: infra
        format_sql: true
    hibernate:
      ddl-auto: update
  flyway:
    enabled: true
    schemas: infra
    default-schema: infra
    validate-on-migrate: false    
    locations: classpath:db/migration
    out-of-order: true
    create-schemas: true
  profiles:
    active: dev
management:
  endpoints:
    web:
      base-path: /
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

# logging:
#   charset:
#     console: UTF-8
#   file:
#     charset: UTF-8

app:
  api:
    title: Infra Service API
    description: infra
    security:
      enabled: true
  s3:
    bucket: ctrl-s3
    ttlSeconds: 600
